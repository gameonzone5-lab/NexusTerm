plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.nexus.terminal'
    compileSdk 34

    defaultConfig {
        applicationId "com.nexus.terminal"
        minSdk 24
        targetSdk 34  // লেটেস্ট অ্যান্ড্রয়েড সাপোর্ট (Play Protect ওয়ার্নিং আসবে না)
        versionCode 6
        versionName "6.0-NativeEngine"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true // OS-কে বাধ্য করবে proot আনজিপ করে Execute পারমিশন দিতে
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
