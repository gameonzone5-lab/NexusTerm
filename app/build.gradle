plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.nexus.terminal'
    compileSdk 34

    defaultConfig {
        applicationId "com.nexus.terminal"
        minSdk 24
        targetSdk 34
        versionCode 10
        versionName "10.0-VerifiedEngine"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
        // চ্যাটজিপিটি সল্যুশন: গ্রেডল যাতে বাইনারি ডিলিট বা নষ্ট না করতে পারে
        doNotStrip "**/libproot.so"
        doNotStrip "**/libproot-loader.so"
        doNotStrip "**/libproot-loader64.so"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
