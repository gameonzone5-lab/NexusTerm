name: NexusTerm Cloud Compiler with Verification

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cloud Injection & Pre-Verify
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        wget https://github.com/CypherpunkArmory/UserLAnd/releases/download/v2.8.3/app-release.apk -O temp.apk
        unzip -j -o temp.apk "lib/arm64-v8a/libuserland-exec.so" -d app/src/main/jniLibs/arm64-v8a/
        unzip -j -o temp.apk "lib/arm64-v8a/libuserland-exec-loader.so" -d app/src/main/jniLibs/arm64-v8a/
        mv app/src/main/jniLibs/arm64-v8a/libuserland-exec.so app/src/main/jniLibs/arm64-v8a/libproot.so
        mv app/src/main/jniLibs/arm64-v8a/libuserland-exec-loader.so app/src/main/jniLibs/arm64-v8a/libproot-loader.so
        cp app/src/main/jniLibs/arm64-v8a/libproot-loader.so app/src/main/jniLibs/arm64-v8a/libproot-loader64.so
        rm temp.apk
        
        echo "=== CHATGPT STEP 1: VERIFYING jniLibs BEFORE GRADLE BUILD ==="
        ls -R app/src/main/jniLibs

    - name: Build APK with doNotStrip
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Post-Build Verification (Check inside final APK)
      run: |
        echo "=== CHATGPT STEP 2: VERIFYING INSIDE FINAL APK ==="
        unzip -l app/build/outputs/apk/release/app-release-unsigned.apk | grep lib || echo "NO LIBS FOUND!"

    - name: Upload Verified Output
      uses: actions/upload-artifact@v4
      with:
        name: NexusTerm-PlayStore-Ready
        path: app/build/outputs/apk/release/app-release-unsigned.apk
